
services:
  # PostgreSQL
  postgres:
    image: postgres:latest
    container_name: postgres_db_l35
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1337!
      POSTGRES_DB: notifications
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq_broker_l35
    restart: unless-stopped
    environment:

      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  rabbitmq_logs:

networks:
  app-network:
    driver: bridge